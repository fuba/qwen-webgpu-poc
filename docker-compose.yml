services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: ["./scripts/dev-server.sh"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5180:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./logs:/app/logs

volumes:
  node_modules:
